name: Deploy to Firebase Hosting

# Auto-deploys the web app to Firebase Hosting on every push to main.
#
# ONE-TIME SETUP (Dave) before this works — see also docs/DEPLOY.md:
#   1. Generate a CI service account:
#        firebase init hosting:github   (writes the secret for you)
#      OR create a service account with the "Firebase Hosting Admin" role and
#      add its JSON key as the repo secret FIREBASE_SERVICE_ACCOUNT.
#   2. Add the (public) Firebase web config as repo *Variables*
#      (Settings → Secrets and variables → Actions → Variables):
#        VITE_FIREBASE_API_KEY, VITE_FIREBASE_AUTH_DOMAIN,
#        VITE_FIREBASE_DATABASE_URL, VITE_FIREBASE_PROJECT_ID,
#        VITE_FIREBASE_STORAGE_BUCKET, VITE_FIREBASE_MESSAGING_SENDER_ID,
#        VITE_FIREBASE_APP_ID
#
# Until the FIREBASE_SERVICE_ACCOUNT secret exists, this job is skipped.
# Cloud Functions and database rules are still deployed manually
# (`firebase deploy --only functions,database`) — they change rarely.
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Dormant until Dave sets the repo Variable DEPLOY_ENABLED=true (after adding
    # the FIREBASE_SERVICE_ACCOUNT secret + VITE_FIREBASE_* vars). Keeps main
    # green in the meantime instead of failing on a missing secret.
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ vars.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: aligned-9f843
          channelId: live
