name: CI

# Lint, test and build on every push and PR. No secrets required — this runs
# immediately. The Firebase web config is absent here, which is fine: the build
# only needs it at runtime, and vite compiles cleanly without it.
on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # The RTDB emulator needs a JVM, and current firebase-tools requires
      # JDK 21+ ("no longer supports Java version before 21"). Pin it explicitly
      # rather than relying on the runner's default JDK, which is older.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Build Cloud Functions
        run: |
          npm --prefix functions ci
          npm --prefix functions run build
      # Security rules are verified against a real emulator (JDK 21 set up above).
      # Rules that are never tested are rules nobody can trust (CLAUDE.md §7).
      - name: Test security rules
        run: |
          npm i -g firebase-tools
          npm run test:rules
