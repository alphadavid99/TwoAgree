name: Deploy to Firebase Hosting

# Auto-deploys the web app to Firebase Hosting on every push to main.
#
# ONE-TIME SETUP (Dave): add a single repo secret named FIREBASE_SERVICE_ACCOUNT
# (a Firebase service-account JSON key). Step-by-step in docs/DEPLOY.md.
#
# The public Firebase web config lives in the committed .env.production, so no
# repo Variables are needed. Until the secret exists this job runs but no-ops,
# keeping main green. Cloud Functions + database rules are still deployed
# manually (`firebase deploy --only functions,database`) — they change rarely.
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Gate on the secret being present. No secret yet → skip the deploy steps
      # instead of failing, so main stays green until setup is done.
      - id: gate
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "$SA" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "FIREBASE_SERVICE_ACCOUNT is not set yet — skipping deploy."
          fi

      - if: steps.gate.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - if: steps.gate.outputs.ready == 'true'
        run: npm ci

      - if: steps.gate.outputs.ready == 'true'
        run: npm run build

      - name: Deploy to Firebase Hosting (live)
        if: steps.gate.outputs.ready == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: aligned-9f843
          channelId: live
