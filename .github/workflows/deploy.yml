name: Deploy to Firebase Hosting

# Auto-deploys the web app to Firebase Hosting on every push to main.
#
# ONE-TIME SETUP (Dave): add a single repo secret named FIREBASE_SERVICE_ACCOUNT
# (a Firebase service-account JSON key). Step-by-step in docs/DEPLOY.md.
#
# The public Firebase web config lives in the committed .env.production, so no
# repo Variables are needed. Until the secret exists this job runs but no-ops,
# keeping main green. Database rules (database.rules.json) deploy here too, so a
# rules change (e.g. the consents node) reaches production without a manual step.
# Cloud Functions are still deployed manually (`firebase deploy --only functions`).
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Gate on the secret being present. No secret yet → skip the deploy steps
      # instead of failing, so main stays green until setup is done.
      - id: gate
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "$SA" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "FIREBASE_SERVICE_ACCOUNT is not set yet — skipping deploy."
          fi

      - if: steps.gate.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - if: steps.gate.outputs.ready == 'true'
        run: npm ci

      - if: steps.gate.outputs.ready == 'true'
        run: npm run build

      # Deploy the Cloud Functions (generatePath, invites, GDPR) BEFORE Hosting,
      # so the front-end never goes live pointing at a function that isn't there.
      # Was a manual step; automated here now that the Path depends on it.
      - name: Deploy Cloud Functions (live)
        if: steps.gate.outputs.ready == 'true'
        # Non-blocking until the CI service account has "Service Account User" on
        # twoagreeapp@appspot.gserviceaccount.com (iam.serviceAccounts.ActAs).
        # Without it functions deploy fails; we must NOT let that skip the Hosting
        # and DB-rules deploys below. Once the role is granted, drop this line so a
        # real functions failure blocks the deploy again.
        continue-on-error: true
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          npm --prefix functions ci
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          npx --yes firebase-tools@latest deploy \
            --only functions \
            --project twoagreeapp \
            --non-interactive
          rm -f "$RUNNER_TEMP/sa.json"

      - name: Deploy to Firebase Hosting (live)
        if: steps.gate.outputs.ready == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: twoagreeapp
          channelId: live

      # Deploy the Realtime Database security rules from database.rules.json.
      # The Hosting action above never touches rules, so without this the
      # committed rules (e.g. the consents/{uid} node onboarding writes to)
      # never reach production and those writes get PERMISSION_DENIED.
      - name: Deploy Realtime Database rules (live)
        if: steps.gate.outputs.ready == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          npx --yes firebase-tools@latest deploy \
            --only database \
            --project twoagreeapp \
            --non-interactive
          rm -f "$RUNNER_TEMP/sa.json"
